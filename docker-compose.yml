services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - GENERIC_TIMEZONE=Europe/Lisbon
      - TZ=Europe/Lisbon
      # Necessário para os webhooks externos (Cal.com) chegarem à instância local.
      # Substituir pelo URL do túnel (cloudflared) antes de ativar os workflows com webhook.
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678/}
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
    # Reutiliza o volume global "n8n_data" (sem prefixo do projeto compose),
    # onde ficam os workflows e credenciais da instância.
    name: n8n_data
